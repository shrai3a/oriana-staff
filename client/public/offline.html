<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بدون اتصال - Oriana Staff</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #333;
    }

    p {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .status {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #999;
    }

    .button {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .button:active {
      transform: translateY(0);
    }

    .info {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #999;
    }

    .info h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .info ul {
      list-style: none;
      text-align: right;
    }

    .info li {
      margin-bottom: 8px;
    }

    .info li:before {
      content: "✓ ";
      color: #667eea;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    
    <h1>بدون اتصال بالإنترنت</h1>
    
    <p>يبدو أنك غير متصل بالإنترنت في الوقت الحالي.</p>
    
    <div class="status">
      <p>سيتم مزامنة بياناتك تلقائياً عند استعادة الاتصال</p>
    </div>

    <button class="button" onclick="location.reload()">
      إعادة المحاولة
    </button>

    <div class="info">
      <h3>يمكنك القيام بـ:</h3>
      <ul>
        <li>عرض سجل الحضور السابق</li>
        <li>عرض ملفك الشخصي</li>
        <li>عرض الإحصائيات المحفوظة</li>
      </ul>
    </div>
  </div>

  <script>
    // Check connection status
    window.addEventListener('online', () => {
      console.log('Connection restored');
      setTimeout(() => {
        location.reload();
      }, 1000);
    });

    // Auto-reload when connection is restored
    if (navigator.onLine) {
      location.reload();
    }
  </script>
</body>
</html>
